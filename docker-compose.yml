services:
  postgres_qqsi:
    image: postgres:15.1
    restart: always
    container_name: postgres_qqsi
    environment:
      POSTGRES_DB: qqsi_db
      POSTGRES_USER: uqqsi
      POSTGRES_PASSWORD: secret123
    ports:
      - 5432:5432
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql